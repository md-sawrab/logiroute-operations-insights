name: Generate GIF preview

on:
  push:
    paths:
      - 'Video.mp4'
      - '.github/workflows/generate-gif.yml'
      - 'README.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Generate palette and GIF
        run: |
          ffmpeg -y -ss 00:00:01 -t 6 -i Video.mp4 -vf "fps=15,scale=640:-1:flags=lanczos,palettegen" palette.png
          ffmpeg -y -ss 00:00:01 -t 6 -i Video.mp4 -i palette.png -lavfi "fps=15,scale=640:-1:flags=lanczos [x]; [x][1:v] paletteuse" preview.gif

      - name: Commit and push generated GIF
        uses: EndBug/add-and-commit@v9
        with:
          author_name: github-actions
          author_email: github-actions@github.com
          message: "chore: add generated preview.gif"
          add: "preview.gif"
          push: true
